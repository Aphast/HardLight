- type: entity
  id: BaseTorpedo
  name: BaseTorpedo
  description: If you can see this you're probably dead!
  abstract: true
  components:
  - type: Clickable
  - type: Physics
    bodyType: Dynamic
    linearDamping: 0
    angularDamping: 0
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeCircle
          radius: 1
        density: 1500
        layer:
        - WallLayer
        mask:
        - MachineMask
  - type: Projectile
    impactEffect: BulletImpactEffect
    damage:
      types:
        Piercing: 14
    soundHit:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
  - type: TimedDespawn
    lifetime: 10
  - type: TriggerOnCollide
    fixtureID: projectile

# base end

